# =============================================================
# Weekly Maintenance - Dependency & Overrides Check
#
# This workflow runs every Sunday to proactively check if your
# 'pnpm.overrides' are still necessary.
#
# How it works:
# 1. Removes the 'overrides' block from package.json
# 2. Runs pnpm install and OSV audit
# 3. If everything passes, it automatically opens a Pull Request
#    to remove the redundant overrides for you.
# =============================================================

name: Weekly Maintenance 🧹

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prune_overrides:
    name: Prune Redundant Overrides ✂️
    if: github.event_name != 'workflow_dispatch' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Remove overrides & update lockfile 🛠️
        id: check
        run: |
          # Use jq to remove the overrides block safely
          if jq -e '.pnpm.overrides' package.json >/dev/null; then
            jq 'del(.pnpm.overrides)' package.json > package.json.tmp && mv package.json.tmp package.json
            pnpm install --no-frozen-lockfile --prefer-offline
            echo "has_overrides=true" >> "$GITHUB_OUTPUT"
          else
            echo "No overrides found to prune."
            echo "has_overrides=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OSV Scanner 🔍
        if: steps.check.outputs.has_overrides == 'true'
        run: |
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml

      - name: Create Pull Request if redundant 🚀
        if: steps.check.outputs.has_overrides == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'chore(deps): prune redundant dependency overrides'
          branch: maintenance/prune-overrides
          delete-branch: true
          assignees: chitrank2050
          title: '🧹 Prune redundant dependency overrides'
          body: |
            The weekly maintenance check has detected that your `pnpm.overrides` are no longer necessary.
            Upstream packages have been updated and the security vulnerabilities previously mitigated by these overrides are now resolved in the base versions.
          labels: |
            dependencies
            maintenance
            automated-pr
