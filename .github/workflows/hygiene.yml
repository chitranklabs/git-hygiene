# =============================================================
# Git Hygiene Dogfooding 🌊
#
# This workflow uses the project's own CLI and logic to
# validate its own Pull Requests.
# =============================================================

name: Git Hygiene 🌊

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hygiene:
    name: Metadata Validation 🧼
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 100 # Needed to see history for commit validation

      - name: Install pnpm 📦
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 📥
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Project 🏗️
        run: pnpm build

      - name: Validate PR Title 🏷️
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node --experimental-strip-types packages/cli/src/cli.ts title "$PR_TITLE"

      - name: Validate Branch Name 🌿
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          node --experimental-strip-types packages/cli/src/cli.ts branch "$BRANCH_NAME"

      - name: Validate Commit History 📜
        run: |
          # Fetch enough history to see the PR commits
          git fetch origin main --depth=100

          # Get list of commit SHAs in this PR
          COMMITS=$(git rev-list origin/main..HEAD)

          for sha in $COMMITS; do
            MSG=$(git log -1 --pretty=%B "$sha")
            echo "Checking commit $sha..."
            node packages/cli/dist/cli.js commit "$MSG"
          done
