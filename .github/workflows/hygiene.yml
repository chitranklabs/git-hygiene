# =============================================================
# Git Hygiene Dogfooding 🌊
#
# This workflow uses the project's own CLI and logic to
# validate its own Pull Requests.
# =============================================================

name: Git Hygiene 🌊

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hygiene:
    name: Metadata Validation 🧼
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Build Project 🏗️
        run: pnpm build

      - name: Validate PR Title 🏷️
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          node --experimental-strip-types packages/cli/src/cli.ts title "$TITLE"

      - name: Validate Branch Name 🌿
        run: |
          BRANCH="${{ github.head_ref }}"
          node --experimental-strip-types packages/cli/src/cli.ts branch "$BRANCH"

      - name: Validate Commit History 📜
        run: |
          # Fetch enough history to see the PR commits
          git fetch origin main --depth=100

          # Get list of commit SHAs in this PR
          COMMITS=$(git rev-list origin/main..HEAD)

          for sha in $COMMITS; do
            MSG=$(git log -1 --pretty=%B "$sha")
            echo "Checking commit $sha..."
            node --experimental-strip-types packages/cli/src/cli.ts commit "$MSG"
          done
