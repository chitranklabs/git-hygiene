# =============================================================
# Stale Issue & PR Management
# =============================================================

name: Stale 🧹

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stale:
    if: github.event_name != 'workflow_dispatch' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Mark Stale 🧹
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions! 🌊'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions! 🏗️'
          stale-issue-label: 'status/stale'
          stale-pr-label: 'status/stale'
          days-before-stale: 60
          days-before-close: 14
          exempt-all-issue-assignees: true
          exempt-all-issue-milestones: true
          exempt-draft-pr: true
          exempt-issue-labels: 'status/blocked,type/feature,priority/high,pinned,security'
          exempt-pr-labels: 'status/blocked,priority/high,pinned,security'
