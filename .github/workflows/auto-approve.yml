# =============================================================
# Smart Auto-Merge 🤖✅
#
# Automatically enables auto-merge for PRs from Renovate,
# release, or maintenance branches once CI passes.
#
# Branch protection is configured to allow chitrank-bot to
# bypass approval requirements, so this workflow only needs
# to enable auto-merge — no review/approval step required.
# =============================================================

name: Auto-Approve 🤖✅

on:
  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows:
      - 'CI & Security Analysis ⚡️'
    branches:
      - 'renovate/**'
      - 'chore/changelog-*'
      - 'maintenance/*'
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Enable Auto-Merge ✅
    runs-on: ubuntu-latest
    # Skip immediately if CI didn't succeed (saves a runner minute)
    if: >-
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'skipped' ||
      github.event.workflow_run.conclusion == 'neutral'
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Resolve PR & Validate Source 🔍
        id: guard
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          # 1. Find PR number — try event payload first, fall back to API lookup.
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR array empty in event payload. Looking up by branch: $HEAD_BRANCH"
            PR_NUMBER=$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$HEAD_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "ℹ️ No open PR found for branch $HEAD_BRANCH. Nothing to do."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Fetch authoritative PR data (author, branch) — don't trust event payload.
          PR_DATA=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json author,headRefName,state)

          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')

          if [ "$PR_STATE" != "OPEN" ]; then
            echo "ℹ️ PR #$PR_NUMBER is $PR_STATE — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Authorize: must match a known automation pattern.
          IS_RENOVATE=false
          IS_RELEASE=false
          IS_MAINTENANCE=false

          if [[ "$PR_AUTHOR" == *"renovate"* ]] || [[ "$PR_BRANCH" == renovate/* ]]; then
            IS_RENOVATE=true
          fi
          if [[ "$PR_BRANCH" == chore/changelog-* ]]; then
            IS_RELEASE=true
          fi
          if [[ "$PR_BRANCH" == maintenance/* ]]; then
            IS_MAINTENANCE=true
          fi

          if [ "$IS_RENOVATE" != "true" ] && [ "$IS_RELEASE" != "true" ] && [ "$IS_MAINTENANCE" != "true" ]; then
            echo "🚫 PR #$PR_NUMBER (author: $PR_AUTHOR, branch: $PR_BRANCH) is not an authorized automation source."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Authorized PR #$PR_NUMBER (author: $PR_AUTHOR, branch: $PR_BRANCH)"
          {
            echo "should_run=true"
            echo "pr_number=$PR_NUMBER"
            echo "pr_author=$PR_AUTHOR"
            echo "pr_branch=$PR_BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Mergeability & Check Status 🕵️
        if: steps.guard.outputs.should_run == 'true'
        id: verify
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ steps.guard.outputs.pr_number }}
        run: |
          set -euo pipefail

          PR_DATA=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json mergeable,mergeStateStatus,statusCheckRollup)

          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
          MERGE_STATE=$(echo "$PR_DATA" | jq -r '.mergeStateStatus')

          if [ "$MERGEABLE" == "CONFLICTING" ]; then
            echo "❌ PR has merge conflicts. Skipping."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find any check that isn't done-and-green.
          # Exclude this workflow itself (it's still running right now).
          PENDING_OR_FAILED=$(echo "$PR_DATA" | jq -r '
            .statusCheckRollup
            | map(select(
                (.status != "COMPLETED")
                or (.conclusion != "SUCCESS" and .conclusion != "NEUTRAL" and .conclusion != "SKIPPED")
              ))
            | map(.name // .context // "Unknown")
            | map(select(. | test("Auto-Approve|Auto-Merge|Enable Auto-Merge") | not))
            | .[]
          ' || true)

          if [ -n "$PENDING_OR_FAILED" ]; then
            echo "⏳ Other checks not yet green:"
            echo "$PENDING_OR_FAILED"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            # exit 0 — this is "wait for next CI run", not a failure.
            exit 0
          fi

          echo "✅ All checks green, no conflicts."
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Enable Auto-Merge 🚀
        if: steps.verify.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ steps.guard.outputs.pr_number }}
        run: |
          set -euo pipefail

          # Branch protection allows chitrank-bot to bypass review requirements,
          # so we don't need to approve — just enable auto-merge.
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --body "🤖 Auto-merge enabled — will merge once all checks are green."

          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
