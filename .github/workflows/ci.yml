# =============================================================
# CI & Security Analysis ⚡️
#
# Optimized primary pipeline for code quality and security.
# Triggers only when relevant files change to save minutes.
# =============================================================

name: CI 🌊

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.vscode/**'
      - '.editorconfig'
      - 'cliff.toml'
      - 'lefthook.yml'
  pull_request:
    branches: [main]

concurrency:
  # Ensure only one CI run per branch/PR at a time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── CHANGE DETECTION ────────────────────────────────────────
  changes:
    name: Detect Changes 🔍
    runs-on: ubuntu-latest
    outputs:
      logic: ${{ steps.filter.outputs.logic }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            logic:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
            docs:
              - 'docs/**'
              - '*.md'

  # ─── QUALITY ASSURANCE ───────────────────────────────────────
  quality:
    name: Hygiene & Security 🧼🛡️
    needs: changes
    if: needs.changes.outputs.logic == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run Parallel Checks ⚡️
        run: |
          echo "::group::Starting Parallel Checks"
          mkdir -p .ci-status

          # 1. Turbo Build
          (pnpm build > .ci-status/build.log 2>&1 || echo "1" > .ci-status/build.fail) &

          # 2. Turbo Test
          (pnpm test > .ci-status/test.log 2>&1 || echo "1" > .ci-status/test.fail) &

          # 3. Turbo Lint
          (pnpm lint > .ci-status/lint.log 2>&1 || echo "1" > .ci-status/lint.fail) &

          # 4. OSV Scanner (Security)
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          (./osv-scanner --lockfile=pnpm-lock.yaml > .ci-status/osv.log 2>&1 || echo "1" > .ci-status/osv.fail) &

          echo "All checks started. Waiting for completion..."
          wait
          echo "::endgroup::"

          # Report Results
          EXIT_CODE=0
          for log in .ci-status/*.log; do
            job=$(basename "$log" .log)
            if [ -f ".ci-status/$job.fail" ]; then
              echo "::error::❌ $job failed"
              cat "$log"
              EXIT_CODE=1
            else
              echo "✅ $job passed"
            fi
          done
          exit $EXIT_CODE

  secret_scan:
    name: Secret Scan 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks 🕵️
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
