# =============================================================
# Automated PR Labeler
#
# Automatically labels Pull Requests based on the files changed.
# This helps with project organization and changelog generation.
# =============================================================

name: Labeler 🏷️

on:
  # zizmor: ignore[dangerous-triggers]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  label:
    name: Apply Labels 🏷️
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@v4

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Label PR 🏷️
        uses: actions/labeler@v5
        with:
          repo-token: '${{ steps.generate_token.outputs.token }}'
          sync-labels: true
          configuration-path: .github/labeler.yml
