# Lefthook - Git hooks manager
# Replaces Husky + lint-staged.
# Docs: https://lefthook.dev/configuration/

# ─── pre-commit ──────────────────────────────────────────────
# Runs in parallel: secrets scan first, then per-file linting.
pre-commit:
  parallel: true
  commands:
    # 1. Block commits that contain secrets/credentials
    secrets:
      run: if command -v gitleaks > /dev/null; then gitleaks protect --staged --redact -v; else echo "gitleaks not found, skipping secrets scan."; fi

    # 2. TypeScript files - ESLint fix + Prettier format
    lint-ts:
      glob: '*.ts'
      run: pnpm exec eslint {staged_files} --fix && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 3. Markdown files - markdownlint fix + Prettier format
    lint-md:
      glob: '*.md'
      run: pnpm exec markdownlint --fix {staged_files} && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 4. JSON / YAML - Prettier format only
    lint-json-yml:
      glob: '*.{json,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 5. GitHub Actions - Security linting
    lint-actions:
      glob: '.github/workflows/*.yml'
      run: if command -v zizmor > /dev/null; then zizmor {staged_files}; else echo "zizmor not found, skipping actions lint. Install with 'brew install zizmor'"; fi

commit-msg:
  commands:
    hygiene:
      run: node --experimental-strip-types packages/cli/src/cli.ts commit {1}

# ─── pre-push ────────────────────────────────────────────────
# Runs unit tests before any push reaches the remote.
pre-push:
  commands:
    tests:
      run: pnpm test

    branch-name:
      run: pnpm lint:branch
