name: 'Git Hygiene Validator'
description: 'Zero-dependency metadata validator for Commits, Branches, and PR Titles'
author: 'Chitrank Agnihotri'

branding:
  icon: 'wind'
  color: 'blue'

inputs:
  command:
    description: 'The validation command to run (branch, title, commit, bump). Leave empty for "Omni-Mode" (auto-detect).'
    required: false
    default: 'omni'
  value:
    description: 'The value to validate (for title and commit commands)'
    required: false

outputs:
  releaseType:
    description: 'The recommended release type (patch, minor, major) for the bump command'
  reason:
    description: 'The reason for the recommended bump'

runs:
  using: 'composite'
  steps:
    - name: Run Git Hygiene 🌊
      shell: bash
      run: |
        # 1. Determine Binary (Prefer local build for dogfooding, else npx)
        if [ -f "packages/cli/dist/cli.js" ]; then
          HYGIENE_BIN="node packages/cli/dist/cli.js"
        else
          HYGIENE_BIN="npx --yes @chitrank2050/git-hygiene@latest"
        fi

        COMMAND="${{ inputs.command }}"

        # 2. Handle "Omni-Mode" (Auto-detect)
        if [ "$COMMAND" == "omni" ]; then
          echo "::group::🌊 Git Hygiene Omni-Mode"
          
          # Validate PR Title if in PR context
          if [ -n "${{ github.event.pull_request.title }}" ]; then
            echo "Checking PR Title..."
            $HYGIENE_BIN title "${{ github.event.pull_request.title }}"
          fi

          # Validate Branch Name if in PR context
          if [ -n "${{ github.head_ref }}" ]; then
            echo "Checking Branch Name..."
            $HYGIENE_BIN branch "${{ github.head_ref }}"
          fi

          # Always show Recommended Bump
          echo "Calculating Recommended Bump..."
          RESULT=$($HYGIENE_BIN bump --json)
          echo "releaseType=$(echo $RESULT | jq -r .releaseType)" >> $GITHUB_OUTPUT
          echo "reason=$(echo $RESULT | jq -r .reason)" >> $GITHUB_OUTPUT
          $HYGIENE_BIN bump
          
          echo "::endgroup::"

        # 3. Handle Explicit Commands
        elif [ "$COMMAND" == "bump" ]; then
          RESULT=$($HYGIENE_BIN bump --json)
          echo "releaseType=$(echo $RESULT | jq -r .releaseType)" >> $GITHUB_OUTPUT
          echo "reason=$(echo $RESULT | jq -r .reason)" >> $GITHUB_OUTPUT
          $HYGIENE_BIN bump
        elif [ -n "${{ inputs.value }}" ]; then
          $HYGIENE_BIN $COMMAND "${{ inputs.value }}"
        else
          $HYGIENE_BIN $COMMAND
        fi
