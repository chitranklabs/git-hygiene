name: 'Git Hygiene Validator'
description: 'Zero-dependency metadata validator for Commits, Branches, and PR Titles'
author: 'Chitrank Agnihotri'

branding:
  icon: 'wind'
  color: 'blue'

inputs:
  command:
    description: 'The validation command to run (branch, title, commit)'
    required: true
  value:
    description: 'The value to validate (for title and commit commands)'
    required: false

outputs:
  releaseType:
    description: 'The recommended release type (patch, minor, major) for the bump command'
  reason:
    description: 'The reason for the recommended bump'

runs:
  using: 'composite'
  steps:
    - name: Run Git Hygiene 🌊
      shell: bash
      run: |
        if [ "${{ inputs.command }}" == "bump" ]; then
          RESULT=$(npx --yes @chitrank2050/git-hygiene@latest bump --json)
          echo "releaseType=$(echo $RESULT | jq -r .releaseType)" >> $GITHUB_OUTPUT
          echo "reason=$(echo $RESULT | jq -r .reason)" >> $GITHUB_OUTPUT
          # Also print for logs
          npx --yes @chitrank2050/git-hygiene@latest bump
        elif [ -n "${{ inputs.value }}" ]; then
          npx --yes @chitrank2050/git-hygiene@latest ${{ inputs.command }} "${{ inputs.value }}"
        else
          npx --yes @chitrank2050/git-hygiene@latest ${{ inputs.command }}
        fi
